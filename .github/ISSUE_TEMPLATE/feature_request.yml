name: Feature request
description: Suggest a new capability or an API to expose from the Rust core
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do that you can't today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: How would you like it to look from C#? Include a usage sketch if you can.
      render: csharp
    validations:
      required: false
  - type: input
    id: core-api
    attributes:
      label: Related core API (optional)
      description: If this maps to an existing `oxidize-pdf` Rust API, name it.
      placeholder: "oxidize_pdf::graphics::GraphicsContext::set_fill_color_icc"
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
